<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732">
  <defs>
    <!-- Emerald gradient background (Rex brand) -->
    <radialGradient id="bg" cx="40%" cy="35%" r="80%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="55%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </radialGradient>

    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="14"/>
    </filter>
    <filter id="roughLight" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Background doodles (scribbles) -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.32" filter="url(#roughLight)">
    <path d="M 250 350 Q 320 320 380 360 T 500 340"/>
    <path d="M 2200 400 Q 2270 430 2330 390"/>
    <path d="M 300 2300 L 340 2340 M 350 2300 L 310 2340"/>
    <path d="M 2350 2200 q -25 -25 0 -50 q 25 0 0 -25"/>
    <circle cx="2450" cy="1300" r="25"/>
    <circle cx="2450" cy="1300" r="10" fill="#ffffff"/>
    <path d="M 280 1300 L 310 1340 L 340 1300" />
    <path d="M 200 1800 q 30 -20 60 0 q -30 20 0 40 q 30 -20 60 0"/>
    <path d="M 2400 1700 L 2450 1750 M 2400 1750 L 2450 1700"/>
  </g>

  <!-- Music notes scattered -->
  <g fill="#ffffff" opacity="0.85" filter="url(#roughLight)">
    <g transform="translate(550, 600) rotate(-15)">
      <ellipse cx="0" cy="0" rx="45" ry="32"/>
      <rect x="30" y="-180" width="18" height="184" rx="5"/>
      <path d="M 48 -180 Q 115 -160 95 -100 Q 110 -130 48 -110 Z"/>
    </g>
    <g transform="translate(2150, 800) rotate(20)">
      <ellipse cx="0" cy="0" rx="36" ry="26"/>
      <rect x="22" y="-140" width="14" height="144" rx="4"/>
    </g>
    <g transform="translate(2050, 2050) rotate(-10)">
      <ellipse cx="0" cy="0" rx="40" ry="30"/>
      <rect x="26" y="-150" width="16" height="156" rx="4"/>
      <path d="M 42 -150 Q 105 -130 85 -85 Z"/>
    </g>
  </g>

  <!-- T-Rex (kid-drawn) — centered, scaled 2.4x -->
  <g transform="translate(1366, 1400) scale(2.4)" filter="url(#rough)">

    <!-- Tail -->
    <path d="M -100 30 Q -200 0 -270 70 Q -290 90 -270 80 Q -190 30 -90 60 Z"
          fill="#fbbf24" stroke="#1f2937" stroke-width="6" stroke-linejoin="round"/>

    <!-- Body -->
    <ellipse cx="-10" cy="20" rx="135" ry="145" fill="#fbbf24" stroke="#1f2937" stroke-width="7"/>

    <!-- Tummy spot -->
    <ellipse cx="-30" cy="80" rx="60" ry="50" fill="#fde68a" opacity="0.75"/>

    <!-- Back legs -->
    <path d="M -60 140 Q -68 220 -78 260 Q -82 285 -50 285 Q -25 285 -22 260 Q -15 220 -10 150 Z"
          fill="#fbbf24" stroke="#1f2937" stroke-width="6" stroke-linejoin="round"/>
    <path d="M 40 140 Q 35 220 25 260 Q 22 285 50 285 Q 75 285 80 260 Q 88 220 85 150 Z"
          fill="#fbbf24" stroke="#1f2937" stroke-width="6" stroke-linejoin="round"/>

    <!-- Toes -->
    <path d="M -65 270 L -58 285 M -50 272 L -50 287 M -35 270 L -42 285"
          stroke="#1f2937" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 30 270 L 37 285 M 50 272 L 50 287 M 65 270 L 58 285"
          stroke="#1f2937" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Neck -->
    <path d="M 70 -40 Q 115 -120 100 -180 Q 90 -220 140 -210 Q 180 -200 160 -135 Q 145 -85 120 -30 Z"
          fill="#fbbf24" stroke="#1f2937" stroke-width="6" stroke-linejoin="round"/>

    <!-- Head -->
    <ellipse cx="160" cy="-210" rx="100" ry="70"
             fill="#fbbf24" stroke="#1f2937" stroke-width="6"/>

    <!-- Mouth + teeth -->
    <path d="M 180 -190 Q 250 -188 270 -200" stroke="#1f2937" stroke-width="4"
          stroke-linecap="round" fill="none"/>
    <path d="M 200 -200 L 270 -195 L 255 -180 Z" fill="#1f2937"/>
    <path d="M 210 -195 L 215 -185 L 220 -195 M 230 -195 L 235 -185 L 240 -195 M 250 -195 L 255 -185 L 260 -195"
          fill="#ffffff"/>

    <!-- Big eye -->
    <circle cx="170" cy="-230" r="22" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
    <circle cx="174" cy="-227" r="11" fill="#1f2937"/>
    <circle cx="177" cy="-230" r="4" fill="#ffffff"/>

    <!-- Tiny arms with fingers -->
    <path d="M 65 -10 Q 100 -25 115 0 Q 110 12 95 12 Q 75 8 65 -2 Z"
          fill="#fbbf24" stroke="#1f2937" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 105 8 L 110 18 M 100 10 L 102 20 M 92 10 L 92 20"
          stroke="#1f2937" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Spikes -->
    <g fill="#f59e0b" stroke="#1f2937" stroke-width="3" stroke-linejoin="round">
      <path d="M -45 -75 L -55 -115 L -25 -90 Z"/>
      <path d="M -10 -100 L -22 -135 L 10 -110 Z"/>
      <path d="M 30 -110 L 22 -148 L 55 -115 Z"/>
      <path d="M 65 -105 L 65 -140 L 92 -110 Z"/>
    </g>
  </g>

  <!-- App name in handwritten style -->
  <g transform="translate(1366, 2200)" filter="url(#rough)">
    <text x="0" y="0" font-family="Comic Sans MS, Marker Felt, Arial Black"
          font-size="280" font-weight="900" fill="#ffffff"
          text-anchor="middle" stroke="#1f2937" stroke-width="14"
          paint-order="stroke" letter-spacing="20">REX</text>
  </g>

  <!-- Subtitle (small, casual) -->
  <text x="1366" y="2380" text-anchor="middle"
        font-family="Comic Sans MS, Marker Felt, Arial"
        font-size="64" fill="#1f2937" opacity="0.7">너의 음악 친구 🦖</text>
</svg>
